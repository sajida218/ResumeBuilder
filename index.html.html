<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}

.title {
    text-align: center;
    margin-top: 20px;
}
.subtitle {
    text-align: center;
    margin-bottom: 20px;
    color: #555;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.form, .resume {
    width: 50%;
    padding: 20px;
    background: white;
    border-radius: 10px;
}

.form h2 {
    margin-bottom: 10px;
}

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

textarea {
    height: 80px;
}

#educationFields input {
    margin-bottom: 8px;
}

button {
    padding: 10px;
    width: 100%;
    background: #2c3e50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #34495e;
}

/* Resume styling */
.resume {
    width: 50%;
    padding: 30px;
    background: white;
    border-radius: 10px;
    font-family: 'Segoe UI', sans-serif;
    line-height: 1.6;
}

.resume h1 {
    margin-bottom: 5px;
    font-size: 28px;
}

.resume p {
    margin: 5px 0;
    color: #333;
}

.resume h3 {
    margin-top: 20px;
    border-bottom: 2px solid #2c3e50;
    padding-bottom: 5px;
    color: #2c3e50;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .form, .resume {
        width: 100%;
    }
}
    </style>
</head>

<body>

    <h1 class="title">Resume Builder-for biginers</h1>
    <h2 class="subtitle">Create Your Professional Resume in Minutes</h2>

    <div class="container">
        
        <!-- FORM -->
        <div class="form">
            <h2>Enter Your Details</h2>

            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="email" placeholder="Email">
            <input type="text" id="phone" placeholder="Phone Number">

            <textarea id="skills" placeholder="Skills"></textarea>
            <h3>Education</h3>
<div id="educationFields">
    <input type="text" class="edu" placeholder="Degree / School">
</div>

<button type="button" onclick="addEducation()">+ Add Education</button>
            <textarea id="experience" placeholder="Experience"></textarea>

            <button onclick="downloadPDF()">Download PDF</button>
        </div>

        <!-- RESUME PREVIEW -->
        <div class="resume" id="resumePreview">
            <h1 id="rName">Your Name</h1>
            <p id="rEmail"></p>
            <p id="rPhone"></p>

            <h3>Skills</h3>
            <p id="rSkills"></p>

            <h3>Education</h3>
            <p id="rEducation"></p>

            <h3>Experience</h3>
<p id="rExperience"></p>
        </div>

    </div>

    <!-- PDF LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
    <script>
        // NAME
document.getElementById("name").addEventListener("input", function () {
    document.getElementById("rName").innerText = this.value || "Your Name";
});

// EMAIL
document.getElementById("email").addEventListener("input", function () {
    document.getElementById("rEmail").innerText = this.value;
});

// PHONE
document.getElementById("phone").addEventListener("input", function () {
    document.getElementById("rPhone").innerText = this.value;
});

// SKILLS
document.getElementById("skills").addEventListener("input", function () {
    const skillsArray = this.value.split(",");
    document.getElementById("rSkills").innerHTML =
        "<ul>" + skillsArray.map(skill => `<li>${skill}</li>`).join("") + "</ul>";
});
// EDUCATION
// Add new education field
function addEducation() {
    const container = document.getElementById("educationFields");

    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Degree / School";
    input.className = "edu";

    container.appendChild(input);

    input.addEventListener("input", updateEducation);
};

// Update preview
function updateEducation() {
    const values = document.querySelectorAll(".edu");
    let output = "<ul>";

    values.forEach(input => {
        if (input.value.trim() !== "") {
            output += `<li>${input.value}</li>`;
        }
    });

    output += "</ul>";
    document.getElementById("rEducation").innerHTML = output;
}

// Attach listener to first field
document.querySelector(".edu").addEventListener("input", updateEducation);

// EXPERIENCE
document.getElementById("experience").addEventListener("input", function () {
    document.getElementById("rExperience").innerText = this.value;
});

// DOWNLOAD PDF
function downloadPDF() {
    const element = document.getElementById("resumePreview");

    const opt = {
        margin: 0.5,
        filename: 'resume.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
    </script>

</body>
</html>
